<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 新闻中心 - QIS Dashboard</title>
  <style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #283548;
    --surface3: #334155;
    --border: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --purple: #a78bfa;
    --pink: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  
  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-btn {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn:hover {
    background: var(--accent);
    color: #0f172a;
    font-weight: 600;
  }
  .date-badge {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Container */
  .container {
    max-width: 1640px;
    margin: 0 auto;
    padding: 24px 40px;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1;
    min-width: 180px;
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 44px;
    height: 44px;
    background: rgba(56, 189, 248, 0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .stat-content h3 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-content p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Loading */
  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
  }
  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-text {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Category Tabs */
  .category-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    padding: 8px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  .category-tab {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .category-tab:hover {
    background: var(--surface2);
    color: var(--text);
  }
  .category-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0f172a;
    font-weight: 600;
  }
  .category-tab .tab-count {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  .category-tab.active .tab-count {
    background: rgba(0,0,0,0.2);
  }

  /* News Section */
  .news-section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon {
    font-size: 24px;
  }
  .section-count {
    padding: 4px 12px;
    background: var(--surface2);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Source Grid */
  .source-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 20px;
  }
  
  /* Source Card */
  .source-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .source-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .source-card.error {
    opacity: 0.6;
    border-color: var(--red);
  }
  .source-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    border-bottom: 1px solid var(--border);
  }
  .source-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .source-icon {
    font-size: 22px;
  }
  .source-name {
    font-size: 15px;
    font-weight: 600;
  }
  .source-count {
    padding: 3px 10px;
    background: var(--surface);
    border-radius: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .source-error {
    color: var(--red);
    font-size: 12px;
    padding: 8px 16px;
    background: rgba(248, 113, 113, 0.1);
  }

  /* News List */
  .news-list {
    max-height: 320px;
    overflow-y: auto;
  }
  .news-list::-webkit-scrollbar {
    width: 6px;
  }
  .news-list::-webkit-scrollbar-track {
    background: var(--surface);
  }
  .news-list::-webkit-scrollbar-thumb {
    background: var(--surface3);
    border-radius: 3px;
  }
  .news-list::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }
  
  .news-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  .news-item:hover {
    background: rgba(56, 189, 248, 0.05);
  }
  .news-item:last-child {
    border-bottom: none;
  }
  .news-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-item:hover .news-title {
    color: var(--accent);
  }
  .news-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .news-time {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .news-summary {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-tag {
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .news-tag.important {
    background: rgba(251, 191, 36, 0.2);
    color: var(--yellow);
  }
  .news-tag.hot {
    background: rgba(248, 113, 113, 0.2);
    color: var(--red);
  }

  /* Empty State */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .header { padding: 12px 20px; }
    .container { padding: 16px 20px; }
    .source-grid { grid-template-columns: 1fr; }
    .stats-bar { flex-direction: column; }
  }
  </style>
</head>
<body>

<div class="header">
  <h1>📰 新闻中心</h1>
  <div class="header-right">
    <button class="header-btn" onclick="window.location.href='/'">📊 返回Dashboard</button>
    <button class="header-btn" onclick="refreshNews()">🔄 刷新新闻</button>
    <div class="date-badge">更新: <strong id="fetchTime">--</strong></div>
  </div>
</div>

<div class="container">
  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-content">
        <h3 id="totalCount">--</h3>
        <p>总新闻数</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-content">
        <h3 id="successCount">--</h3>
        <p>成功源数</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-content">
        <h3 id="financeCount">--</h3>
        <p>财经新闻</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔥</div>
      <div class="stat-content">
        <h3 id="hotCount">--</h3>
        <p>热搜资讯</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💻</div>
      <div class="stat-content">
        <h3 id="techCount">--</h3>
        <p>科技动态</p>
      </div>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="category-tabs">
    <button class="category-tab active" data-category="all" onclick="filterCategory('all')">
      <span>📋</span> 全部
      <span class="tab-count" id="tabAll">--</span>
    </button>
    <button class="category-tab" data-category="finance" onclick="filterCategory('finance')">
      <span>💰</span> 财经快讯
      <span class="tab-count" id="tabFinance">--</span>
    </button>
    <button class="category-tab" data-category="hot" onclick="filterCategory('hot')">
      <span>🔥</span> 热搜榜单
      <span class="tab-count" id="tabHot">--</span>
    </button>
    <button class="category-tab" data-category="tech" onclick="filterCategory('tech')">
      <span>💻</span> 科技资讯
      <span class="tab-count" id="tabTech">--</span>
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在获取最新新闻，请稍候...</div>
  </div>

  <!-- News Content -->
  <div id="newsContent" style="display:none;"></div>
</div>

<div class="footer">
  QIS Dashboard News Center &copy; 2026 | 数据来源: 同花顺、财新网、华尔街见闻、东方财富、金十数据、36氪、百度、知乎、微博、今日头条、澎湃、B站、IT之家、GitHub、掘金
</div>

<script>
// Global state
let newsData = null;
let currentCategory = 'all';

// Category config
const categoryConfig = {
  finance: { name: '💰 财经快讯', icon: '💰' },
  hot: { name: '🔥 热搜榜单', icon: '🔥' },
  tech: { name: '💻 科技资讯', icon: '💻' }
};

// Fetch news
async function fetchNews() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('newsContent').style.display = 'none';
  
  try {
    const response = await fetch('/api/news');
    const result = await response.json();
    
    if (result.ok && result.data) {
      newsData = result.data;
      updateStats();
      renderNews();
    } else {
      showError(result.error || '获取新闻失败');
    }
  } catch (e) {
    showError('网络错误: ' + e.message);
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('newsContent').style.display = 'block';
  }
}

// Update statistics
function updateStats() {
  if (!newsData) return;
  
  document.getElementById('fetchTime').textContent = newsData.fetch_time || '--';
  document.getElementById('totalCount').textContent = newsData.total_count || 0;
  document.getElementById('successCount').textContent = newsData.success_count || 0;
  
  // Count by category
  let financeCount = 0, hotCount = 0, techCount = 0;
  
  (newsData.finance || []).forEach(s => financeCount += s.count || 0);
  (newsData.hot || []).forEach(s => hotCount += s.count || 0);
  (newsData.tech || []).forEach(s => techCount += s.count || 0);
  
  document.getElementById('financeCount').textContent = financeCount;
  document.getElementById('hotCount').textContent = hotCount;
  document.getElementById('techCount').textContent = techCount;
  
  // Update tabs
  document.getElementById('tabAll').textContent = newsData.total_count || 0;
  document.getElementById('tabFinance').textContent = financeCount;
  document.getElementById('tabHot').textContent = hotCount;
  document.getElementById('tabTech').textContent = techCount;
}

// Render news
function renderNews() {
  if (!newsData) return;
  
  const container = document.getElementById('newsContent');
  let html = '';
  
  const categories = currentCategory === 'all' 
    ? ['finance', 'hot', 'tech'] 
    : [currentCategory];
  
  for (const cat of categories) {
    const sources = newsData[cat] || [];
    if (sources.length === 0) continue;
    
    const config = categoryConfig[cat];
    const totalCount = sources.reduce((sum, s) => sum + (s.count || 0), 0);
    
    html += `
      <div class="news-section" data-category="${cat}">
        <div class="section-header">
          <div class="section-title">
            <span class="icon">${config.icon}</span>
            ${config.name}
          </div>
          <span class="section-count">${totalCount} 条新闻</span>
        </div>
        <div class="source-grid">
    `;
    
    for (const source of sources) {
      html += renderSourceCard(source);
    }
    
    html += `
        </div>
      </div>
    `;
  }
  
  if (!html) {
    html = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>暂无新闻数据</p>
      </div>
    `;
  }
  
  container.innerHTML = html;
}

// Render source card
function renderSourceCard(source) {
  const { name, icon, news, count, success, error } = source;
  
  let newsListHtml = '';
  if (!success) {
    newsListHtml = `<div class="source-error">❌ ${error || '获取失败'}</div>`;
  } else if (!news || news.length === 0) {
    newsListHtml = `<div class="empty-state"><p>暂无数据</p></div>`;
  } else {
    newsListHtml = '<div class="news-list">';
    for (const item of news) {
      newsListHtml += renderNewsItem(item);
    }
    newsListHtml += '</div>';
  }
  
  return `
    <div class="source-card ${success ? '' : 'error'}">
      <div class="source-header">
        <div class="source-info">
          <span class="source-icon">${icon}</span>
          <span class="source-name">${name}</span>
        </div>
        <span class="source-count">${count} 条</span>
      </div>
      ${newsListHtml}
    </div>
  `;
}

// Render news item
function renderNewsItem(item) {
  const { title, url, time, summary, digest, important, flag, metrics, stars, hot_value } = item;
  
  const displaySummary = summary || digest || '';
  const displayTime = time || '';
  
  // Tags
  let tags = '';
  if (important) tags += '<span class="news-tag important">重要</span>';
  if (flag) tags += `<span class="news-tag hot">${flag}</span>`;
  if (metrics) tags += `<span class="news-tag">${metrics}</span>`;
  if (stars) tags += `<span class="news-tag">⭐ ${stars}</span>`;
  if (hot_value) tags += `<span class="news-tag">🔥 ${hot_value}</span>`;
  
  return `
    <div class="news-item" onclick="openNews('${escapeHtml(url || '')}')">
      <div class="news-title">${escapeHtml(title || '无标题')}</div>
      <div class="news-meta">
        ${displayTime ? `<span class="news-time">🕐 ${displayTime}</span>` : ''}
        ${tags}
      </div>
      ${displaySummary ? `<div class="news-summary">${escapeHtml(displaySummary)}</div>` : ''}
    </div>
  `;
}

// Filter by category
function filterCategory(category) {
  currentCategory = category;
  
  // Update tab active state
  document.querySelectorAll('.category-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.category === category);
  });
  
  renderNews();
}

// Open news URL
function openNews(url) {
  if (url) {
    window.open(url, '_blank');
  }
}

// Refresh news
function refreshNews() {
  fetchNews();
}

// Show error
function showError(message) {
  const container = document.getElementById('newsContent');
  container.innerHTML = `
    <div class="empty-state">
      <div class="icon">❌</div>
      <p>${escapeHtml(message)}</p>
      <button class="header-btn" onclick="refreshNews()" style="margin-top: 16px;">重试</button>
    </div>
  `;
}

// Escape HTML
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Init
document.addEventListener('DOMContentLoaded', fetchNews);
</script>
</body>
</html>
