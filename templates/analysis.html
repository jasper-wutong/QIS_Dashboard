<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QIS Analysis - {{ date_str }}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #283548;
    --border: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header .date-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 16px; font-size: 13px; color: var(--text-muted);
  }
  .header .date-badge strong { color: var(--accent); }
  .refresh-btn {
    padding: 7px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .refresh-btn:hover { background: var(--accent); color: #0f172a; font-weight: 600; }

  /* ── Layout ── */
  .container { max-width: 1800px; margin: 0 auto; padding: 28px 40px 60px; }

  .section-group { margin-bottom: 40px; }
  .section-title {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .section-title h2 { font-size: 17px; font-weight: 600; }
  .section-title .sub { font-size: 12px; color: var(--text-muted); }

  /* ── Summary strip ── */
  .summary-strip {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 22px; min-width: 160px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: var(--accent); display: inline; }
  .stat-card .unit  { font-size: 13px; color: var(--text-muted); margin-left: 4px; }

  /* ── Chart wrapper ── */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
  }
  .chart-scroll-wrap {
    overflow-x: auto; overflow-y: visible;
    padding-bottom: 8px;
  }
  .chart-scroll-wrap::-webkit-scrollbar { height: 6px; }
  .chart-scroll-wrap::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
  .chart-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Loading / Error ── */
  .loading-msg {
    display: flex; align-items: center; justify-content: center;
    height: 220px; color: var(--text-muted); font-size: 14px; gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(248,113,113,0.1); border: 1px solid var(--red);
    border-radius: 8px; padding: 14px 18px; color: var(--red); font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 QIS Analysis</h1>
  <div class="header-right">
    <button class="refresh-btn" onclick="window.location.href='/'">📊 Dashboard</button>
    <button class="refresh-btn" onclick="window.location.href='/qis-book'">📊 QIS BOOK</button>
    <button class="refresh-btn" onclick="loadTimeline()">🔄 刷新</button>
    <div class="date-badge">Data: <strong>{{ date_str }}</strong> &nbsp;|&nbsp; {{ now_time }}</div>
  </div>
</div>

<div class="container">

  <!-- ── Section 1: 到期名义本金时间轴 ── -->
  <div class="section-group">
    <div class="section-title">
      <h2>📅 到期名义本金时间轴</h2>
      <span class="sub">Trade 合约 · 按到期日汇总名义本金 · 仅展示未来到期</span>
    </div>

    <!-- Summary stats -->
    <div class="summary-strip" id="summaryStrip" style="display:none;">
      <div class="stat-card">
        <div class="label">Trade 合约总数</div>
        <div class="value" id="statTradeCount">—</div>
      </div>
      <div class="stat-card">
        <div class="label">到期日数</div>
        <div class="value" id="statDateCount">—</div>
      </div>
      <div class="stat-card">
        <div class="label">未来总名义本金</div>
        <div class="value" id="statTotalNotional">—</div><span class="unit">亿</span>
      </div>
      <div class="stat-card">
        <div class="label">最大单日到期</div>
        <div class="value" id="statPeakNotional">—</div><span class="unit">亿</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-card">
      <div id="loadingArea" class="loading-msg">
        <div class="spinner"></div> 正在加载合约数据（首次约 5-10 秒）…
      </div>
      <div id="errorArea" style="display:none;"></div>
      <div id="chartArea" style="display:none;">
        <div class="chart-scroll-wrap">
          <canvas id="maturityChart"></canvas>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let chartInstance = null;

const PALETTE = [
  '#38bdf8','#818cf8','#34d399','#fb923c','#f472b6',
  '#fbbf24','#22d3ee','#a78bfa','#86efac','#fca5a5',
  '#67e8f9','#c4b5fd','#6ee7b7','#fcd34d','#f9a8d4',
];

function fmtWan(v) {
  const wan = v / 10000;
  if (wan >= 10000) return (wan / 10000).toFixed(2) + ' 亿';
  return wan.toFixed(0) + ' 万';
}
function fmtYi(v) {
  return (v / 1e8).toFixed(2);
}

async function loadTimeline() {
  document.getElementById('loadingArea').style.display = 'flex';
  document.getElementById('errorArea').style.display  = 'none';
  document.getElementById('chartArea').style.display  = 'none';
  document.getElementById('summaryStrip').style.display = 'none';

  let resp, data;
  try {
    resp = await fetch('/api/analysis/maturity-timeline');
    data = await resp.json();
  } catch (e) {
    showError('网络错误: ' + e.message);
    return;
  }
  if (!data.ok) {
    showError('API 错误: ' + (data.error || '未知错误'));
    return;
  }

  renderChart(data);
}

function showError(msg) {
  document.getElementById('loadingArea').style.display = 'none';
  const el = document.getElementById('errorArea');
  el.style.display = 'block';
  el.innerHTML = `<div class="error-msg">⚠ ${msg}</div>`;
}

function renderChart(data) {
  const timeline = data.timeline;
  if (!timeline || timeline.length === 0) {
    showError('没有找到未来到期的 trade 合约数据');
    return;
  }

  // ── Summary stats ──
  const totalNotional = timeline.reduce((s, d) => s + d.total, 0);
  const peakNotional  = Math.max(...timeline.map(d => d.total));
  document.getElementById('statTradeCount').textContent   = data.trade_count;
  document.getElementById('statDateCount').textContent    = timeline.length;
  document.getElementById('statTotalNotional').textContent = fmtYi(totalNotional);
  document.getElementById('statPeakNotional').textContent  = fmtYi(peakNotional);
  document.getElementById('summaryStrip').style.display = 'flex';

  // ── Chart data ──
  const labels = timeline.map(d => {
    const dt = new Date(d.date + 'T00:00:00');
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  });
  const values = timeline.map(d => d.total / 1e4); // -> 万

  // Canvas width: at least 44px per bar
  const minBarW = 44;
  const canvasW = Math.max(window.innerWidth - 160, timeline.length * minBarW);
  const canvas  = document.getElementById('maturityChart');
  canvas.width  = canvasW;
  canvas.height = 400;

  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 400);
  grad.addColorStop(0, 'rgba(56,189,248,0.85)');
  grad.addColorStop(1, 'rgba(129,140,248,0.55)');

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '名义本金（万）',
        data: values,
        backgroundColor: grad,
        borderColor: 'rgba(56,189,248,0.9)',
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: false,
      animation: { duration: 600 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          borderColor: '#334155',
          borderWidth: 1,
          titleColor: '#38bdf8',
          titleFont: { size: 14, weight: 'bold' },
          bodyColor: '#e2e8f0',
          bodyFont: { family: 'Consolas, monospace', size: 12 },
          padding: 16,
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            title(items) {
              const idx = items[0].dataIndex;
              return `📅  ${timeline[idx].date}`;
            },
            label() { return ''; },
            afterBody(items) {
              const idx   = items[0].dataIndex;
              const entry = timeline[idx];
              const lines = [
                `  合计名义本金：${fmtWan(entry.total)}`,
                '  ─────────────────────────'
              ];
              const sorted = Object.entries(entry.underlyings)
                .sort((a, b) => b[1] - a[1]);
              sorted.forEach(([u, n]) => {
                const pct = (n / entry.total * 100).toFixed(1);
                lines.push(`  ${u.padEnd(16)} ${fmtWan(n).padStart(12)}  (${pct}%)`);
              });
              return lines;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(51,65,85,0.5)' },
          ticks: {
            color: '#94a3b8',
            font: { size: 11 },
            maxRotation: 60,
            minRotation: 45,
          }
        },
        y: {
          grid: { color: 'rgba(51,65,85,0.5)' },
          ticks: {
            color: '#94a3b8',
            font: { size: 11 },
            callback(v) {
              if (v >= 10000) return (v / 10000).toFixed(1) + ' 亿';
              if (v >= 1000) return (v / 10000).toFixed(2) + ' 亿';
              return v + ' 万';
            }
          },
          title: {
            display: true,
            text: '名义本金',
            color: '#64748b',
            font: { size: 12 }
          }
        }
      }
    }
  });

  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('chartArea').style.display   = 'block';
}

// Auto-load on page open
loadTimeline();
</script>
</body>
</html>
