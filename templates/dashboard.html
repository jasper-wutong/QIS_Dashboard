<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QIS SubBook Dashboard - {{ date_str }}</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #283548;
    --border: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --yellow: #fbbf24;
    --pink: #f472b6;
    --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ──────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header .date-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .header .date-badge strong { color: var(--accent); }
  .refresh-btn {
    padding: 7px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: var(--accent); color: #0f172a; font-weight: 600; }

  /* ── Container ───────────────────────────── */
  .container { max-width: 1640px; margin: 0 auto; padding: 20px 40px 60px; }

  /* ── Section Title ───────────────────────── */
  .section-group { margin-bottom: 32px; }
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-title h2 { font-size: 17px; font-weight: 600; }
  .section-title .badge {
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 12px;
    font-weight: 600;
  }
  .badge-index { background: rgba(56,189,248,0.15); color: var(--accent); }
  .badge-other { background: rgba(129,140,248,0.15); color: var(--accent2); }
  .badge-sector { background: rgba(251,191,36,0.15); color: var(--yellow); }

  /* ── Sector Sections ─────────────────────── */
  .sector-section { margin-bottom: 20px; }
  .sector-section .section-title h2 { font-size: 16px; }
  .sector-summary { margin-bottom: 12px; }
  .sector-summary .s-card { padding: 10px 12px; }
  .sector-summary .s-card .s-value { font-size: 15px; }

  /* ── Region Split Layout ─────────────────── */
  .region-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .region-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    min-height: 100px;
  }
  .region-panel.domestic { border-left: 3px solid var(--green); }
  .region-panel.overseas { border-left: 3px solid var(--accent); }
  .region-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .region-header h4 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
  }
  .region-header h4.domestic { color: var(--green); }
  .region-header h4.overseas { color: var(--accent); }
  .region-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .region-badge.domestic { background: rgba(52,211,153,0.15); color: var(--green); }
  .region-badge.overseas { background: rgba(56,189,248,0.15); color: var(--accent); }
  .region-empty {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }
  .region-table { margin-top: 8px; }
  .region-table table { font-size: 12px; }
  @media (max-width: 1200px) {
    .region-container { grid-template-columns: 1fr; }
  }

  /* ── Summary Grid ────────────────────────── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .s-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .s-card:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .s-card .s-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .s-card .s-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .s-card .s-value.pos { color: var(--green); }
  .s-card .s-value.neg { color: var(--red); }
  .s-card .s-value.neutral { color: var(--accent); }

  /* ── Aggregate Banner ────────────────────── */
  .agg-banner {
    background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(129,140,248,0.08));
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .agg-banner .agg-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--accent); }
  .agg-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 10px;
  }
  .agg-item { background: rgba(15,23,42,0.5); border-radius: 8px; padding: 12px 14px; }
  .agg-item .agg-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .agg-item .agg-val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .agg-item .agg-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* ── Tabs ─────────────────────────────────── */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-color: transparent;
    font-weight: 600;
  }
  .tab .cnt {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    margin-left: 5px;
  }

  /* ── Toolbar ──────────────────────────────── */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .search-box { flex: 1; max-width: 340px; position: relative; }
  .search-box input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 15px; height: 15px; }
  .row-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .btn {
    padding: 7px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--accent); color: #0f172a; font-weight: 600; }

  /* ── Table ───────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    max-height: 520px;
    overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface2);
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.3px;
    padding: 11px 12px;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    text-align: left;
    z-index: 2;
  }
  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after { content: " ▲"; color: var(--accent); font-size: 10px; }
  thead th.sort-desc::after { content: " ▼"; color: var(--accent); font-size: 10px; }
  tbody tr { border-bottom: 1px solid rgba(51,65,85,0.5); transition: background 0.12s; }
  tbody tr:hover { background: rgba(56,189,248,0.06); }
  tbody tr:nth-child(even) { background: rgba(30,41,59,0.4); }
  tbody tr:nth-child(even):hover { background: rgba(56,189,248,0.06); }
  td { padding: 9px 12px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.pos { color: var(--green); }
  td.neg { color: var(--red); }
  tr.big-move { background: rgba(251,191,36,0.13) !important; }
  tr.big-move:hover { background: rgba(251,191,36,0.23) !important; }

  .sb-badge { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .sb-QISARES { background: rgba(56,189,248,0.15); color: var(--accent); }
  .sb-QISAUTO { background: rgba(129,140,248,0.15); color: var(--accent2); }
  .sb-QISBTL { background: rgba(52,211,153,0.15); color: var(--green); }
  .sb-QISCMARS { background: rgba(251,146,60,0.15); color: var(--orange); }
  .sb-QISCZBC { background: rgba(244,114,182,0.15); color: var(--pink); }
  .sb-QISMMA { background: rgba(251,191,36,0.15); color: var(--yellow); }

  .no-data { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
  .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 15px; }

  ::-webkit-scrollbar { height: 7px; width: 7px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Research Modal (Full-screen dual-pane) ── */
  .research-overlay {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .research-overlay.show { display: block; }
  .research-modal {
    display: none;
    position: fixed;
    top: 3vh; left: 2vw;
    width: 96vw; height: 94vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    z-index: 201;
    flex-direction: column;
    box-shadow: 0 25px 80px rgba(0,0,0,0.7);
    overflow: hidden;
  }
  .research-modal.show { display: flex; }
  .modal-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }
  .modal-header h3 {
    font-size: 16px; font-weight: 600; color: var(--accent);
  }
  .modal-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 24px; cursor: pointer; padding: 4px 8px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--red); }
  .modal-body {
    display: flex; flex: 1; overflow: hidden;
  }

  /* ── Left Pane: Charts ─────────────────── */
  .modal-left {
    width: 50%; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: #0a0e17;
    overflow: hidden;
  }
  .chart-section { padding: 12px 16px 0; flex-shrink: 0; }
  .chart-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(52,211,153,0.15); color: var(--green);
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; letter-spacing: 0.3px;
    text-transform: uppercase; animation: livePulse 2s ease-in-out infinite;
  }
  .live-badge .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: liveDot 1.5s ease-in-out infinite;
  }
  .live-price-display {
    margin-left: auto; font-size: 13px; font-weight: 700;
    letter-spacing: 0; text-transform: none;
  }
  .live-price-display .lp-price { color: var(--text); }
  .live-price-display .lp-chg { font-size: 11px; font-weight: 600; margin-left: 6px; }
  .live-price-display .lp-chg.pos { color: var(--green); }
  .live-price-display .lp-chg.neg { color: var(--red); }
  .live-price-display .lp-time { color: var(--text-muted); font-size: 10px; font-weight: 400; margin-left: 6px; }
  @keyframes livePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes liveDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
  }
  #mainChartContainer { width: 100%; height: 320px; }
  #volumeChartContainer { width: 100%; height: 100px; }
  .indicator-tabs {
    display: flex; gap: 6px; padding: 10px 16px 4px; flex-shrink: 0;
  }
  .ind-tab {
    padding: 4px 14px; border-radius: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .ind-tab:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .ind-tab.active {
    background: rgba(56,189,248,0.15); color: var(--accent);
    border-color: var(--accent);
  }
  #indicatorChartContainer { width: 100%; height: 140px; }
  .chart-loading {
    display: flex; align-items: center; justify-content: center;
    height: 320px; color: var(--text-muted); font-size: 14px;
  }

  /* ── Fundamentals Cards ────────────────── */
  .fundamentals-section {
    padding: 12px 16px 16px;
    flex-shrink: 0;
  }
  .fund-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .fund-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .fund-card .fc-label {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .fund-card .fc-value {
    font-size: 18px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .fund-card .fc-sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
  }
  .fund-mini-chart { width: 100%; height: 50px; margin-top: 6px; }

  /* ── Left Panel Tab Bar ─────────────────── */
  .left-tabs {
    display: flex; gap: 0; padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
    background: #07090f; flex-shrink: 0;
  }
  .left-tab {
    padding: 6px 16px; border-radius: 6px 6px 0 0;
    border: 1px solid transparent; border-bottom: none;
    color: var(--text-muted); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; user-select: none;
    margin-right: 4px;
  }
  .left-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .left-tab.active {
    background: #0a0e17; color: var(--accent);
    border-color: var(--border); border-bottom-color: #0a0e17;
  }
  .left-tab-panel { display: none; flex-direction: column; overflow-y: auto; flex: 1; }
  .left-tab-panel.active { display: flex; }

  /* ── Quantitative Factor Grid ───────────── */
  .factors-section { padding: 12px 16px; flex-shrink: 0; }
  .factors-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-between; align-items: center;
  }
  .composite-signal-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; margin-bottom: 12px;
  }
  .composite-label { font-size: 11px; color: var(--text-muted); flex: 0 0 auto; }
  .composite-bars { display: flex; gap: 3px; align-items: flex-end; }
  .composite-bar {
    width: 14px; border-radius: 3px 3px 0 0;
    background: rgba(255,255,255,0.08); transition: all 0.3s;
  }
  .composite-bar.h1 { height: 10px; }
  .composite-bar.h2 { height: 16px; }
  .composite-bar.h3 { height: 22px; }
  .composite-bar.h4 { height: 28px; }
  .composite-bar.h5 { height: 34px; }
  .composite-bar.filled-green  { background: var(--green); }
  .composite-bar.filled-lightgreen { background: #86efac; }
  .composite-bar.filled-yellow { background: var(--yellow); }
  .composite-bar.filled-orange { background: var(--orange); }
  .composite-bar.filled-red    { background: var(--red); }
  .composite-signal-text { font-size: 14px; font-weight: 700; margin-left: 4px; }
  .composite-en { font-size: 10px; color: var(--text-muted); }

  .factor-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; margin-bottom: 12px;
  }
  .factor-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; padding: 9px 11px; position: relative;
  }
  .factor-card:hover { background: rgba(255,255,255,0.045); }
  .fc2-label {
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 0.3px; margin-bottom: 3px;
  }
  .fc2-value {
    font-size: 17px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .fc2-desc { font-size: 10px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
  .fc2-badge {
    position: absolute; top: 7px; right: 8px;
    font-size: 9px; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-bull        { background: rgba(52,211,153,0.15);  color: var(--green); }
  .badge-bear        { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-neut        { background: rgba(148,163,184,0.1);  color: var(--text-muted); }
  .badge-strong-bull { background: rgba(52,211,153,0.25);  color: #4ade80; }
  .badge-strong-bear { background: rgba(248,113,113,0.25); color: #fb7185; }

  /* ── Key Drivers ────────────────────────── */
  .drivers-list { list-style: none; padding: 0; margin: 0; }
  .driver-item {
    padding: 8px 11px; border-radius: 8px; margin-bottom: 5px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    display: flex; gap: 9px; align-items: flex-start; cursor: default;
  }
  .driver-item:hover { background: rgba(255,255,255,0.04); }
  .driver-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .driver-body { flex: 1; min-width: 0; }
  .driver-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .driver-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .driver-bbg { font-size: 10px; color: var(--accent2); margin-top: 1px; font-family: monospace; opacity: 0.85; }
  .driver-dir { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; float: right; }
  .dir-bull  { background: rgba(52,211,153,0.12);  color: var(--green); }
  .dir-bear  { background: rgba(248,113,113,0.12); color: var(--red); }
  .dir-neut  { background: rgba(148,163,184,0.1);  color: var(--text-muted); }
  .dir-struct { background: rgba(251,191,36,0.12); color: var(--yellow); }

  /* ── Research Notes ─────────────────────── */
  .research-note-box {

    font-size: 11px; color: var(--text-muted);
    margin-top: 8px; padding: 8px 12px;

  }
  .factors-loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-muted); font-size: 13px;
  }
  .sector-hint {
    display: inline-block; font-size: 11px; font-weight: 600;

  }
  .corr-grid {

  }
  .corr-card {

  /* ── Right Pane: Research ──────────────── */

    width: 50%; display: flex; flex-direction: column;

  .research-toolbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .start-research-btn {
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));

    color: #fff; font-size: 14px; font-weight: 600;

    display: flex; align-items: center; gap: 6px;
  }
  .start-research-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-research-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }
  .research-status-tag {
    font-size: 11px; padding: 3px 12px; border-radius: 999px;
  }
  .research-content {
    flex: 1; overflow-y: auto;
    padding: 24px; font-size: 14px; line-height: 1.8;

    padding: 16px 24px;

  /* ── Batch Research Progress ──────────── */

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .batch-result-item .bri-body {

  .research-all-btn {

    border-radius: 8px;

    font-size: 12px;

  @media (max-width: 900px) {
    .container { padding: 14px; }
    .header { padding: 14px; }
    .agg-grid { grid-template-columns: repeat(2, 1fr); }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }

  /* ── Commodity Tooltip ───────────────────── */
  .commodity-tooltip {
    position: fixed;
    z-index: 99999;
    background: linear-gradient(145deg, #1a2540 0%, #12203a 100%);
    border: 1px solid #3a506b;

  .ct-title {
    font-size: 14px;
    font-weight: 700;

  .ct-tag {
    display: inline-block;
    background: rgba(129,140,248,0.15);
    color: #818cf8;
    border-radius: 4px;
    padding: 0 5px;

  }
  .ct-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 6px 0; }

</style>

<body>

<!-- Commodity Tooltip -->
<div id="commodityTooltip" class="commodity-tooltip"></div>

<div class="header">
  <h1>📊 QIS SubBook Dashboard</h1>
  <div class="header-right">
    <button class="refresh-btn" onclick="window.location.href='/analysis'">🔬 Analysis</button>
    <button class="refresh-btn" onclick="window.location.href='/qis-book'">📊 QIS BOOK</button>
    <button class="refresh-btn" onclick="window.location.href='/news'">📰 新闻</button>
    <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
    <div class="date-badge">Data: <strong id="dateLabel">{{ date_str }}</strong> &nbsp;|&nbsp; {{ now_time }}</div>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="loading" id="loadingMsg">加载数据中...</div>

  <div id="dashboardContent" style="display:none;">
    <!-- ── 总汇总 Banner ───────────────────── -->
    <div class="agg-banner">
      <div class="agg-title">📋 总汇总 &mdash; 指数 + 商品期货</div>
      <div class="agg-grid" id="aggGrid"></div>
    </div>

    <!-- ── 指数 Section ────────────────────── -->
    <div class="section-group" id="indexSection">
      <div class="section-title">
        <h2>📈 指数</h2>
        <span class="badge badge-index" id="indexBadge"></span>
      </div>
      <div class="summary-grid" id="indexSummary"></div>
      <div class="tabs" id="indexTabs"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="indexSearch" placeholder="搜索指数...">
        </div>
        <span class="row-count" id="indexRowCount"></span>
        <button class="btn" onclick="exportCSV('index')">⬇ CSV</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr id="indexHeader"></tr></thead><tbody id="indexBody"></tbody></table>
      </div>
    </div>

    <!-- ── 商品期货板块 Sections (动态生成) ──────────────── -->
    <div id="sectorContainer">
      <!-- 板块 sections 将由 JavaScript 动态渲染 -->
    </div>
    
    <!-- ── 一键研究全部按钮 ──────────────── -->
    <div class="section-group" style="padding: 20px;">
      <button class="research-all-btn" id="researchAllBtn" onclick="doResearchAll()">🔬 一键研究全部商品标的</button>
    </div>
  </div>
</div>

<!-- Research Modal (Full-screen dual-pane) -->
<div class="research-overlay" id="researchOverlay" onclick="closeResearchPanel()"></div>
<div class="research-modal" id="researchModal">

  </div>
  <div class="modal-body">
    <!-- Left: Tabbed Panel -->

      <!-- ── Tab Bar ── -->
      <div class="left-tabs" id="leftTabs">
        <div class="left-tab active" data-tab="tabCharts"        onclick="switchLeftTab('tabCharts')">📈 行情图表</div>
        <div class="left-tab"        data-tab="tabFactors"       onclick="switchLeftTab('tabFactors')">🔬 研究因子</div>
        <div class="left-tab"        data-tab="tabTermStructure" onclick="switchLeftTab('tabTermStructure')">📉 期限结构</div>
      </div>

      <!-- ── Tab Panel: Charts (original) ── -->
      <div class="left-tab-panel active" id="tabCharts">
        <div class="chart-section">
          <div class="chart-section-title">
            <span>📈 价格走势 (6M Daily)</span>

            <span id="livePriceDisplay" class="live-price-display" style="display:none"></span>

          <div id="mainChartContainer"><div class="chart-loading">⏳ 加载行情数据...</div></div>

          <div class="chart-section-title">📊 成交量</div>

          <div class="ind-tab active" data-ind="macd" onclick="switchIndicator('macd')">MACD</div>
          <div class="ind-tab" data-ind="rsi" onclick="switchIndicator('rsi')">RSI</div>

      <!-- ── Tab Panel: Research Factors (new) ── -->
      <div class="left-tab-panel" id="tabFactors">

        </div>
      </div>

      <!-- ── Tab Panel: Term Structure (new) ── -->
      <div class="left-tab-panel" id="tabTermStructure">
        <div class="ts-container">
          <div id="termStructureContent">
            <div class="ts-loading">点击标的「🔍 研究」后自动加载...</div>

        </div>

<script>
// ── Globals ───────────────────────────────────
let COLUMNS, INDEX_DATA, OTHER_DATA, SUBBOOKS;
let INDEX_SUMMARY, OTHER_SUMMARY, TOTAL_SUMMARY;
let INDEX_SB, OTHER_SB;
let SECTOR_DATA, SECTOR_SUMMARIES, SECTOR_ORDER, SECTOR_ICONS;
let colIdx, idxShowI, othShowI, sbI;
let researchCache = {};  // {name: {ok, name, model, content}}
let batchRunning = false;
let sectorStates = {};  // {sectorName: {filtered: [], sortCol: -1, sortDir: 0}}
let currentResearch = null;  // {name, price, change, exposure} for chat context
let chatHistory = [];  // [{role: 'user'|'assistant', content: string}]

const SHOW_COLS_INDEX = ["标的物","现价","名称","涨跌幅","Delta($)","SOD Delta($)","%Gamma($)","风险敞口","当日损益","当日损益(合约端)","当日损益(对冲端)","存续名义本金","SubBook","BookID"];
const SHOW_COLS_OTHER = ["标的物","名称","Wind Ticker","现价","涨跌幅","%Gamma($)","风险敞口","__estimated_pnl__","__research__"];

const numCols = new Set(["现价","涨跌幅","Delta($)","SOD Delta($)","PDE Delta($)","%Gamma($)","PDE Gamma(%)","Vega($)","FX Vega($)","Theta","现货市值","期货市值","风险敞口","T+1 风险敞口","风险敞口(PDE)","当日损益","当日损益(PDE)","当日损益(合约端)","当日损益(对冲端)","存续名义本金","Delta Shares","Open Shares","Need To Trade","Exposure pnl","Gamma pnl","Theta pnl","Vega pnl","Borrow pnl","Residual"]);
const colorCols = new Set(["涨跌幅","当日损益","当日损益(合约端)","当日损益(对冲端)","Delta($)","%Gamma($)"]);

const state = {
  index: { book: "ALL", sortCol: -1, sortDir: 0, filtered: [] },
  other: { book: "ALL", sortCol: -1, sortDir: 0, filtered: [] }
};

// ── Formatters ────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined) return "-";
  if (typeof v === "number") {
    if (Math.abs(v) >= 1e8) return (v/1e8).toFixed(2) + "亿";
    if (Math.abs(v) >= 1e4) return (v/1e4).toFixed(2) + "万";
    return v.toLocaleString("en-US", {maximumFractionDigits:2});
  }
  return String(v);
}
function fmtPct(v) {
  if (v === null || v === undefined) return "-";
  return (v * 100).toFixed(2) + "%";
}
function fmtBig(v) {
  if (Math.abs(v) >= 1e8) return (v/1e8).toFixed(2) + "亿";
  if (Math.abs(v) >= 1e4) return (v/1e4).toFixed(2) + "万";
  return v.toLocaleString("en-US", {maximumFractionDigits:0});
}
function valCls(v) { return v > 0 ? "pos" : v < 0 ? "neg" : "neutral"; }

// ── Load data from API ────────────────────────
async function loadData() {
  const resp = await fetch("/api/data");
  const d = await resp.json();

  COLUMNS = d.columns;
  INDEX_DATA = d.index_data;
  OTHER_DATA = d.other_data;
  SUBBOOKS = d.subbooks;
  INDEX_SUMMARY = d.index_summary;
  OTHER_SUMMARY = d.other_summary;
  TOTAL_SUMMARY = d.total_summary;
  INDEX_SB = d.index_sb;
  OTHER_SB = d.other_sb;
  SECTOR_DATA = d.sector_data || {};
  SECTOR_SUMMARIES = d.sector_summaries || {};
  SECTOR_ORDER = d.sector_order || [];
  SECTOR_ICONS = d.sector_icons || {};

  colIdx = {};
  COLUMNS.forEach((c,i) => colIdx[c] = i);
  idxShowI = SHOW_COLS_INDEX.map(c => colIdx[c]).filter(i => i !== undefined);
  othShowI = SHOW_COLS_OTHER.map(c => c === '__research__' ? -999 : c === '__estimated_pnl__' ? -998 : colIdx[c]).filter(i => i !== undefined || i === -999 || i === -998);
  sbI = colIdx["SubBook"];

  state.index.filtered = [...INDEX_DATA];
  state.index.book = "ALL"; state.index.sortCol = -1; state.index.sortDir = 0;
  state.other.filtered = [...OTHER_DATA];
  state.other.book = "ALL"; state.other.sortCol = -1; state.other.sortDir = 0;

  // Initialize sector states (now with domestic/overseas)
  sectorStates = {};
  SECTOR_ORDER.forEach(sec => {
    const secData = SECTOR_DATA[sec] || {};
    sectorStates[sec] = {
      domestic: {
        data: secData.domestic || [],
        filtered: [...(secData.domestic || [])],
        sortCol: -1,
        sortDir: 0
      },
      overseas: {
        data: secData.overseas || [],
        filtered: [...(secData.overseas || [])],
        sortCol: -1,
        sortDir: 0
      }
    };
  });

  document.getElementById("dateLabel").textContent = d.date_str;
  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("dashboardContent").style.display = "block";

  renderAll();
}

function renderAll() {
  renderAgg();
  renderSummaryCards("indexSummary", INDEX_SUMMARY, "index");
  document.getElementById("indexBadge").textContent = INDEX_SUMMARY.count + " 行";
  renderTabs("index");
  renderHeader("index");
  applyFilter("index");
  
  // Render sector sections dynamically
  renderSectorSections();
}

// ── Sector Sections (Dynamic) ─────────────────
function renderSectorSections() {
  const container = document.getElementById('sectorContainer');
  if (!container) return;
  
  let html = '';
  SECTOR_ORDER.forEach(sector => {
    const secData = SECTOR_DATA[sector];
    if (!secData) return;
    
    const domesticData = secData.domestic || [];
    const overseasData = secData.overseas || [];
    const totalCount = domesticData.length + overseasData.length;
    if (totalCount === 0) return;
    
    const summary = SECTOR_SUMMARIES[sector] || {};
    const icon = SECTOR_ICONS[sector] || '📦';
    const secId = 'sector_' + sector.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
    
    html += `
    <div class="section-group sector-section" id="${secId}Section">
      <div class="section-title">
        <h2>${icon} ${sector}</h2>
        <span class="badge badge-sector" id="${secId}Badge">${totalCount} 个标的</span>
      </div>
      <div class="summary-grid sector-summary" id="${secId}Summary"></div>
      <div class="region-container">
        <!-- 境内 -->
        <div class="region-panel domestic">
          <div class="region-header">
            <h4 class="domestic">🇨🇳 境内</h4>
            <span class="region-badge domestic" id="${secId}DomesticBadge">${domesticData.length} 个</span>
          </div>
          <div class="region-table table-wrap">
            <table><thead><tr id="${secId}DomesticHeader"></tr></thead><tbody id="${secId}DomesticBody"></tbody></table>
          </div>
        </div>
        <!-- 境外 -->
        <div class="region-panel overseas">
          <div class="region-header">
            <h4 class="overseas">🌍 境外</h4>
            <span class="region-badge overseas" id="${secId}OverseasBadge">${overseasData.length} 个</span>
          </div>
          <div class="region-table table-wrap">
            <table><thead><tr id="${secId}OverseasHeader"></tr></thead><tbody id="${secId}OverseasBody"></tbody></table>
          </div>
        </div>
      </div>
    </div>`;
  });
  
  container.innerHTML = html;
  
  // Render each sector's content
  SECTOR_ORDER.forEach(sector => {
    const secData = SECTOR_DATA[sector];
    if (!secData) return;
    const domesticData = secData.domestic || [];
    const overseasData = secData.overseas || [];
    if (domesticData.length === 0 && overseasData.length === 0) return;
    
    renderSectorSummary(sector);
    renderRegionHeader(sector, 'domestic');
    renderRegionHeader(sector, 'overseas');
    renderRegionTable(sector, 'domestic');
    renderRegionTable(sector, 'overseas');
  });
}

function getSectorId(sector) {
  return 'sector_' + sector.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
}

function calcSectorEstimatedPnl(sector) {
  const s = sectorStates[sector];
  if (!s) return 0;
  let total = 0;
  ['domestic', 'overseas'].forEach(region => {
    if (s[region] && s[region].data) {
      s[region].data.forEach(row => {
        const exposure = row[colIdx['风险敞口']];
        const change = row[colIdx['涨跌幅']];
        if (typeof exposure === 'number' && typeof change === 'number') {
          total += exposure * change;
        }
      });
    }
  });
  return total;
}

function renderSectorSummary(sector) {
  const summary = SECTOR_SUMMARIES[sector] || {};
  const secId = getSectorId(sector);
  const el = document.getElementById(secId + 'Summary');
  if (!el) return;
  
  const estimatedPnl = calcSectorEstimatedPnl(sector);
  
  const keys = [
    ["Delta($)", "delta"], ["%Gamma($)", "gamma"],
    ["当日损益", "pnl"], ["风险敞口", "exposure"],
  ];
  el.innerHTML = keys.map(([lbl, key]) => `
    <div class="s-card">
      <div class="s-label">${lbl}</div>
      <div class="s-value ${valCls(summary[key] || 0)}">${fmtBig(summary[key] || 0)}</div>
    </div>
  `).join("") + `
    <div class="s-card">
      <div class="s-label">预估PnL</div>
      <div class="s-value ${valCls(estimatedPnl)}">${fmtBig(estimatedPnl)}</div>
    </div>
  `;
}

function renderRegionHeader(sector, region) {
  const secId = getSectorId(sector);
  const regionCap = region.charAt(0).toUpperCase() + region.slice(1);
  const tr = document.getElementById(secId + regionCap + 'Header');
  if (!tr) return;
  
  const s = sectorStates[sector] && sectorStates[sector][region];
  if (!s) return;
  
  tr.innerHTML = othShowI.map((ci, si) => {
    if (ci === -999) return `<th>研究</th>`;
    if (ci === -998) {
      let cls = s.sortCol === si ? (s.sortDir === 1 ? "sort-asc" : "sort-desc") : "";
      return `<th class="${cls}" onclick="doRegionSort('${sector}','${region}',${si})">预估PnL</th>`;
    }
    let cls = s.sortCol === si ? (s.sortDir === 1 ? "sort-asc" : "sort-desc") : "";
    return `<th class="${cls}" onclick="doRegionSort('${sector}','${region}',${si})">${COLUMNS[ci]}</th>`;
  }).join("");
}

function doRegionSort(sector, region, si) {
  const s = sectorStates[sector] && sectorStates[sector][region];
  if (!s) return;
  if (s.sortCol === si) s.sortDir = s.sortDir === 1 ? -1 : s.sortDir === -1 ? 0 : 1;
  else { s.sortCol = si; s.sortDir = 1; }
  renderRegionHeader(sector, region);
  renderRegionTable(sector, region);
}

function renderRegionTable(sector, region) {
  const secId = getSectorId(sector);
  const regionCap = region.charAt(0).toUpperCase() + region.slice(1);
  const s = sectorStates[sector] && sectorStates[sector][region];
  if (!s) return;
  
  const tbody = document.getElementById(secId + regionCap + 'Body');
  if (!tbody) return;
  
  // Apply sort if needed
  let data = [...s.data];
  if (s.sortDir !== 0 && s.sortCol >= 0) {
    const ci = othShowI[s.sortCol];
    data.sort((a,b) => {
      let va, vb;
      if (ci === -998) {
        // Sort by estimated PnL
        const expA = a[colIdx['风险敞口']], chgA = a[colIdx['涨跌幅']];
        const expB = b[colIdx['风险敞口']], chgB = b[colIdx['涨跌幅']];
        va = (typeof expA === 'number' && typeof chgA === 'number') ? expA * chgA : null;
        vb = (typeof expB === 'number' && typeof chgB === 'number') ? expB * chgB : null;
      } else {
        va = a[ci];
        vb = b[ci];
      }
      if (va===null) return 1; if (vb===null) return -1;
      if (typeof va==="number" && typeof vb==="number") return (va-vb)*s.sortDir;
      return String(va).localeCompare(String(vb))*s.sortDir;
    });
  }
  s.filtered = data;

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="${othShowI.length}" class="region-empty">暂无${region === 'domestic' ? '境内' : '境外'}标的</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(row => {
    const exposure = row[colIdx['风险敞口']];
    const change = row[colIdx['涨跌幅']];
    // Calculate estimated PnL: exposure × change
    const estimatedPnl = (typeof exposure === 'number' && typeof change === 'number') ? exposure * change : null;
    row._estimatedPnl = estimatedPnl;  // Store for sorting
    
    const rowClass = (typeof change === 'number' && Math.abs(change) > 0.02) ? ' class="big-move"' : '';
    return `<tr${rowClass}>` + othShowI.map(ci => {
      if (ci === -998) {
        // Estimated PnL column
        if (estimatedPnl === null) return `<td class="num">-</td>`;
        const cls = estimatedPnl > 0 ? "num pos" : estimatedPnl < 0 ? "num neg" : "num";
        return `<td class="${cls}">${fmtBig(estimatedPnl)}</td>`;
      }
      if (ci === -999) {
        const tickerName = row[colIdx['名称']] || row[colIdx['标的物']] || '';
        const price = row[colIdx['现价']];
        const pStr = price !== null && price !== undefined ? String(price) : 'NA';
        const cStr = change !== null && change !== undefined ? String(change) : 'NA';
        const eStr = exposure !== null && exposure !== undefined ? String(exposure) : 'NA';
        const escaped = tickerName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `<td><button class="research-btn" onclick="doResearch('${escaped}','${pStr}','${cStr}','${eStr}')">🔍 研究</button></td>`;
      }
      const col = COLUMNS[ci], v = row[ci];
      if (col === "SubBook") return `<td><span class="sb-badge sb-${v}">${v}</span></td>`;
      const isNum = numCols.has(col) && typeof v === "number";
      let cls = isNum ? "num" : "";
      if (isNum && colorCols.has(col)) { if (v > 0) cls += " pos"; else if (v < 0) cls += " neg"; }
      const display = (col === "涨跌幅" && typeof v === "number") ? fmtPct(v) : fmt(v);
      if ((col === "名称" || col === "标的物") && v) {
        const esc2 = String(v).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `<td class="${cls}"><span class="name-cell" onmouseenter="showCommodityTooltip(event,'${esc2}')" onmouseleave="hideCommodityTooltip()">${display}</span></td>`;
      }
      return `<td class="${cls}">${display}</td>`;
    }).join("") + "</tr>";
  }).join("");
}

function exportSectorCSV(sector) {
  const s = sectorStates[sector];
  if (!s) return;
  
  // Combine domestic and overseas data
  const data = [...(s.domestic.filtered || []), ...(s.overseas.filtered || [])];
  const hdr = othShowI.filter(ci => ci !== -999).map(ci => COLUMNS[ci]).join(",");
  const rows = data.map(r => othShowI.filter(ci => ci !== -999).map(ci => {
    const v = r[ci]; if (v===null) return "";
    if (typeof v==="string" && v.includes(",")) return `"${v}"`;
    return v;
  }).join(","));
  const csv = "\uFEFF" + hdr + "\n" + rows.join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `QIS_${sector}_${document.getElementById("dateLabel").textContent}.csv`;
  a.click();
}

function renderHeader(kind) {

  tr.innerHTML = cols.map((ci, si) => {

  }).join("");
}

function doSort(kind, si) {
  const s = state[kind];
  if (s.sortCol === si) s.sortDir = s.sortDir === 1 ? -1 : s.sortDir === -1 ? 0 : 1;
  else { s.sortCol = si; s.sortDir = 1; }
  renderHeader(kind);
  applyFilter(kind);
}

// ── Filter & Render ───────────────────────────
function applyFilter(kind) {
  const s = state[kind];
  const src = kind === "index" ? INDEX_DATA : OTHER_DATA;
  const showI = kind === "index" ? idxShowI : othShowI;
  const q = document.getElementById(kind + "Search").value.toLowerCase();

  s.filtered = src.filter(r => {
    if (kind === "index" && s.book !== "ALL" && r[sbI] !== s.book) return false;
    if (q) return showI.some(ci => ci >= 0 && r[ci] !== null && String(r[ci]).toLowerCase().includes(q));
    return true;
  });

  if (s.sortDir !== 0 && s.sortCol >= 0) {
    const ci = showI[s.sortCol];
    s.filtered.sort((a,b) => {
      let va=a[ci], vb=b[ci];
      if (va===null) return 1; if (vb===null) return -1;
      if (typeof va==="number" && typeof vb==="number") return (va-vb)*s.sortDir;
      return String(va).localeCompare(String(vb))*s.sortDir;
    });
  }
  renderTable(kind);
}

function renderTable(kind) {
  const s = state[kind];
  const showI = kind === "index" ? idxShowI : othShowI;
  const tbody = document.getElementById(kind + "Body");
  document.getElementById(kind + "RowCount").textContent = s.filtered.length + " rows";

  if (!s.filtered.length) {
    tbody.innerHTML = `<tr><td colspan="${showI.length}" class="no-data">无匹配记录</td></tr>`;
    return;
  }

  tbody.innerHTML = s.filtered.map(row => {
    const chg = row[colIdx['涨跌幅']];
    const rowClass = (typeof chg === 'number' && Math.abs(chg) > 0.02) ? ' class="big-move"' : '';
    return `<tr${rowClass}>` + showI.map(ci => {
    if (ci === -999) {
      const tickerName = row[colIdx['名称']] || row[colIdx['标的物']] || '';
      const price = row[colIdx['现价']];
      const change = row[colIdx['涨跌幅']];
      const exposure = row[colIdx['风险敞口']];
      const pStr = price !== null && price !== undefined ? String(price) : 'NA';
      const cStr = change !== null && change !== undefined ? String(change) : 'NA';
      const eStr = exposure !== null && exposure !== undefined ? String(exposure) : 'NA';
      const escaped = tickerName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<td><button class="research-btn" onclick="doResearch('${escaped}','${pStr}','${cStr}','${eStr}')">🔍 研究</button></td>`;
    }
    const col = COLUMNS[ci], v = row[ci];
    if (col === "SubBook") return `<td><span class="sb-badge sb-${v}">${v}</span></td>`;
    const isNum = numCols.has(col) && typeof v === "number";
    let cls = isNum ? "num" : "";
    if (isNum && colorCols.has(col)) { if (v > 0) cls += " pos"; else if (v < 0) cls += " neg"; }
    const display = (col === "涨跌幅" && typeof v === "number") ? fmtPct(v) : fmt(v);
    if ((col === "名称" || col === "标的物") && v) {
      const esc2 = String(v).replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<td class="${cls}"><span class="name-cell" onmouseenter="showCommodityTooltip(event,'${esc2}')" onmouseleave="hideCommodityTooltip()">${display}</span></td>`;
    }
    return `<td class="${cls}">${display}</td>`;
  }).join("") + "</tr>";
  }).join("");
}

function switchLeftTab(tabId) {

    t.classList.toggle('active', t.dataset.tab === tabId);
  });
  document.querySelectorAll('.left-tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === tabId);
  });
  if (tabId === 'tabCharts') {
    setTimeout(() => {
      const w = document.getElementById('modalLeft').clientWidth - 32;
      if (mainChart)      mainChart.applyOptions({ width: w });
      if (volumeChart)    volumeChart.applyOptions({ width: w });
      if (indicatorChart) indicatorChart.applyOptions({ width: w });
    }, 50);
  }
  if (tabId === 'tabTermStructure') {
    // If chart not yet rendered (was deferred because tab was hidden), render now
    if (_pendingTsData && !tsChart) {
      setTimeout(() => {
        const curve = _pendingTsData.curve;
        const prices = curve.map(p => p.price);
        const front = prices[0], back = prices[prices.length - 1];
        const slope = back - front;
        const structType = slope < -0.002 * front ? 'backwardation'
                         : slope > 0.002 * front  ? 'contango' : 'flat';
        _drawTsChart(curve, structType);
      }, 60);
    } else if (tsChart) {
      setTimeout(() => {
        const w = (document.getElementById('tabTermStructure').clientWidth || 500) - 32;
        if (tsChart) tsChart.applyOptions({ width: w });
      }, 50);
    }
  }
}

function _scoreClass(score) {
  if (score >= 2) return 'pos';
  if (score <= -2) return 'neg';
  if (score === 1) return 'pos';
  if (score === -1) return 'neg';
  return 'neutral';
}

function renderTermStructure(data) {
  const el = document.getElementById('termStructureContent');
  if (!data || !data.ok || !data.curve || data.curve.length < 2) {
    _pendingTsData = null;
    const errMsg = (data && data.error) || '无期限结构数据';
    const errDetail = (data && data.errors && data.errors.length > 0)
      ? data.errors.map(e => `<div style="font-size:10px;color:#64748b;margin-top:2px">• ${e}</div>`).join('')
      : '';
    const sourceHint = (data && data.source) ? `<div style="font-size:11px;color:#64748b;margin-top:4px">数据源: ${data.source}</div>` : '';
    const countInfo = (data && data.total) ? `<div style="font-size:11px;color:#64748b">获取: ${data.count || 0}/${data.total} 个合约</div>` : '';
    el.innerHTML = `
      <div class="ts-loading" style="flex-direction:column;gap:6px;text-align:left;padding:20px">
        <span style="font-size:20px">📉</span>
        <span style="font-size:12px">${errMsg}</span>
        ${countInfo}
        ${sourceHint}
        ${errDetail}
        <div style="font-size:11px;color:#475569;margin-top:6px;border-top:1px solid var(--border);padding-top:6px">
          💡 提示: 所有合约均通过 Bloomberg Terminal 获取数据，请确保已登录
        </div>
      </div>`;
    return;
  }

  _pendingTsData = data;  // store for deferred render

  const curve = data.curve;
  const prices = curve.map(p => p.price);
  const front = prices[0];
  const back  = prices[prices.length - 1];
  const slope = back - front;
  const slopeRatio = front !== 0 ? ((back - front) / front * 100) : 0;

  let structType, structLabel, structClass;
  if (slope < -0.002 * front) {
    structType = 'backwardation'; structLabel = '⬇ Backwardation（现货溢价）'; structClass = 'ts-struct-back';
  } else if (slope > 0.002 * front) {
    structType = 'contango';      structLabel = '⬆ Contango（升水结构）';     structClass = 'ts-struct-cont';
  } else {
    structType = 'flat';          structLabel = '➡ 期限结构平坦';             structClass = 'ts-struct-flat';
  }

  el.innerHTML = `
    <span class="ts-struct-badge ${structClass}">${structLabel}</span>
    <div id="tsChartContainer" style="width:100%;height:220px"></div>
    <div class="ts-slope-info">
      斜率 M1→M${curve.length}:
      <strong style="color:${slope <= 0 ? 'var(--green)':'var(--red)'}">${slope >= 0 ? '+' : ''}${slope.toFixed(4)} (${slopeRatio >= 0 ? '+' : ''}${slopeRatio.toFixed(2)}%)</strong>
      &nbsp;｜&nbsp;
      ${structType === 'backwardation'
        ? '<span style="color:var(--green)">✅ 现货溢价 = 库存紧张信号。做多展期收益正（Roll Yield +）。</span>'
        : structType === 'contango'
          ? '<span style="color:var(--red)">⚠ 升水曲线 = 库存宽松，多头持有存在展期成本（Roll Yield −）。</span>'
          : '<span style="color:var(--text-muted)">期限结构平坦，展期成本接近零。</span>'}
    </div>
    <table class="ts-table">
      <thead><tr>
        <th>合约月份</th>
        <th style="text-align:right">当前价格</th>
        <th style="text-align:right">日涨跌%</th>
        <th>价差(vs M1)</th>
        <th>合约代码</th>
      </tr></thead>
      <tbody>
        ${curve.map((p, i) => {
          const chgPct = p.change_pct;
          const cls = chgPct > 0 ? 'pos' : chgPct < 0 ? 'neg' : 'neutral';
          const spread = i === 0 ? '-' : ((p.price - front) >= 0 ? '+' : '') + (p.price - front).toFixed(4);
          const spreadCls = i === 0 ? '' : (p.price - front) < 0 ? 'pos' : 'neg';
          return `<tr>
            <td><strong>M${i+1}</strong>${i === 0 ? ' <span style="font-size:10px;color:var(--accent)">近月</span>' : ''}</td>
            <td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600">${p.price != null ? p.price.toLocaleString('en-US',{maximumFractionDigits:4}) : 'N/A'}</td>
            <td style="text-align:right" class="${cls}">${chgPct != null ? (chgPct >= 0 ? '+' : '') + Number(chgPct).toFixed(2) + '%' : '-'}</td>
            <td class="${spreadCls}" style="font-variant-numeric:tabular-nums">${spread}</td>
            <td style="font-family:monospace;font-size:10px;color:var(--text-muted)">${p.contract}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  // ── Draw Chart (only if visible) ──
  const tsPanel = document.getElementById('tabTermStructure');
  const isVisible = tsPanel && tsPanel.classList.contains('active');
  if (!isVisible) return;  // will be drawn when user switches to this tab

  _drawTsChart(curve, structType);
}

function _drawTsChart(curve, structType) {
  const chartEl = document.getElementById('tsChartContainer');
  if (!chartEl) return;
  if (tsChart) { try { tsChart.remove(); } catch(e){} tsChart = null; }

  const lineColor = structType === 'backwardation' ? '#34d399'
                  : structType === 'contango'      ? '#f87171'
                  : '#94a3b8';

  tsChart = LightweightCharts.createChart(chartEl, {
    width:  chartEl.clientWidth || 400,
    height: 220,
    layout: {
      background: { type: 'solid', color: CHART_COLORS.bg },
      textColor:  CHART_COLORS.text,
      fontSize: 11,
    },
    grid: {
      vertLines: { color: CHART_COLORS.grid },
      horzLines: { color: CHART_COLORS.grid },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: CHART_COLORS.grid },
    timeScale: { borderColor: CHART_COLORS.grid, timeVisible: false },
    handleScale: { axisPressedMouseMove: true },
  });

  const tsSeries = tsChart.addLineSeries({
    color: lineColor, lineWidth: 2.5,
    pointMarkersVisible: true,
    priceLineVisible: false, lastValueVisible: true,
  });

  const today = new Date();
  const tsData = curve.map((p, i) => ({
    time: new Date(today.getFullYear(), today.getMonth() + i, 1).toISOString().slice(0, 10),
    value: p.price,
  }));
  tsSeries.setData(tsData);

  const markers = curve.map((p, i) => ({
    time: tsData[i].time,
    position: 'aboveBar',
    color: '#94a3b8',
    shape: 'circle',
    text: `M${i+1}`,
    size: 0.5,
  }));
  tsSeries.setMarkers(markers);
  tsChart.timeScale().fitContent();
}

function _setChatEnabled(enabled) {
  const footer = document.getElementById('researchChatFooter');
  const input = document.getElementById('researchChatInput');
  const sendBtn = document.getElementById('researchChatSend');
  if (enabled) {
    footer.classList.remove('disabled');
    input.disabled = false;
    sendBtn.disabled = false;
    input.placeholder = '输入问题，继续对话...';
  } else {
    footer.classList.add('disabled');
    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = '请等待研究报告加载完成...';
    input.value = '';
  }
}

// ── Chat Message Handler ──────────────────────
async function sendChatMessage(event) {
  event.preventDefault();
  
  const input = document.getElementById('researchChatInput');
  const sendBtn = document.getElementById('researchChatSend');
  const body = document.getElementById('researchContent');
  const message = input.value.trim();
  
  if (!message || !currentResearch) return;
  
  // Disable input while sending
  input.disabled = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '发送中...';
  
  // Add user message to display
  const userMsgHtml = `
    <div class="chat-message user">
      <div class="chat-role">💬 你的问题</div>
      <div>${message.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    </div>
  `;
  body.insertAdjacentHTML('beforeend', userMsgHtml);
  
  // Add loading indicator
  const loadingId = 'chat-loading-' + Date.now();
  body.insertAdjacentHTML('beforeend', `
    <div id="${loadingId}" class="chat-message assistant">
      <div class="chat-role">🤖 百炼助手</div>
      <div style="color:var(--text-muted)">⏳ 正在思考...</div>
    </div>
  `);
  body.scrollTop = body.scrollHeight;
  
  // Clear input
  input.value = '';
  
  try {
    const resp = await fetch('/api/research/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: currentResearch.name,
        price: currentResearch.price,
        change: currentResearch.change,
        exposure: currentResearch.exposure,
        message: message,
        history: chatHistory
      })
    });
    const data = await resp.json();
    
    // Remove loading indicator
    document.getElementById(loadingId)?.remove();
    
    if (data.ok && data.content) {
      // Add to chat history
      chatHistory.push({ role: 'user', content: message });
      chatHistory.push({ role: 'assistant', content: data.content });
      
      // Format and display response
      let text = data.content
        .replace(/### (.+)/g, '<h4 style="color:var(--accent);margin:12px 0 6px;">$1</h4>')
        .replace(/## (.+)/g, '<h4 style="color:var(--accent);margin:12px 0 6px;">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--accent2)">$1</strong>')
        .replace(/\n\n/g, '</p><p style="margin:6px 0">')
        .replace(/\n/g, '<br>');
      
      body.insertAdjacentHTML('beforeend', `
        <div class="chat-message assistant">
          <div class="chat-role">🤖 百炼助手</div>
          <div><p style="margin:6px 0">${text}</p></div>
        </div>
      `);
    } else {
      body.insertAdjacentHTML('beforeend', `
        <div class="chat-message assistant">
          <div class="chat-role">🤖 百炼助手</div>
          <div style="color:var(--red)">❌ ${data.error || '请求失败'}</div>
        </div>
      `);
    }
  } catch (err) {
    document.getElementById(loadingId)?.remove();
    body.insertAdjacentHTML('beforeend', `
      <div class="chat-message assistant">
        <div class="chat-role">🤖 百炼助手</div>
        <div style="color:var(--red)">❌ 网络错误: ${err.message}</div>
      </div>
    `);
  } finally {
    input.disabled = false;
    sendBtn.disabled = false;
    sendBtn.textContent = '发送';
    input.focus();
    body.scrollTop = body.scrollHeight;
  }
}

function _renderResearchContent(data) {
  let html = '';
  if (data.model) html += `<span class="model-tag">模型: ${data.model}</span>`;
  if (data.cached) html += `<span class="model-tag" style="background:rgba(251,191,36,0.15);color:var(--yellow);margin-left:6px">缓存</span>`;
  if (data.model || data.cached) html += '<br><br>';
  let text = data.content
    .replace(/### (.+)/g, '<h4 style="color:var(--accent);margin:16px 0 8px;">$1</h4>')
    .replace(/## (.+)/g, '<h4 style="color:var(--accent);margin:16px 0 8px;">$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--accent)">$1</strong>')
    .replace(/\n\n/g, '</p><p style="margin:10px 0">')
    .replace(/\n/g, '<br>');
  html += `<p style="margin:10px 0">${text}</p>`;
  return html;
}

// ═══════════════════════════════════════════════════════════════
//  Chart Rendering (TradingView Lightweight Charts)
// ═══════════════════════════════════════════════════════════════

const CHART_COLORS = {
  bg: '#0a0e17',
  grid: 'rgba(42,46,57,0.4)',
  text: '#787b86',
  crosshair: '#555',
  up: '#26a69a',
  down: '#ef5350',
  ma5: '#f5c842',
  ma20: '#2196f3',
  ma60: '#e91e63',
  bollUpper: 'rgba(33,150,243,0.4)',
  bollLower: 'rgba(33,150,243,0.4)',
  bollMiddle: 'rgba(33,150,243,0.7)',
  macdLine: '#2196f3',
  macdSignal: '#ff6d00',
  macdHistPos: 'rgba(38,166,154,0.6)',
  macdHistNeg: 'rgba(239,83,80,0.6)',
  rsiLine: '#ab47bc',
  rsiOB: 'rgba(239,83,80,0.15)',
  rsiOS: 'rgba(38,166,154,0.15)',
};

function _createChart(container, height) {
  return LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: height || container.clientHeight,
    layout: {
      background: { type: 'solid', color: CHART_COLORS.bg },
      textColor: CHART_COLORS.text,
      fontSize: 11,
    },
    grid: {
      vertLines: { color: CHART_COLORS.grid },
      horzLines: { color: CHART_COLORS.grid },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: CHART_COLORS.grid },
    timeScale: {
      borderColor: CHART_COLORS.grid,
      timeVisible: false,
    },
    handleScale: { axisPressedMouseMove: true },
  });
}

function _toChartTime(dateStr) {
  // "2025-09-05" → "2025-09-05"  (lightweight-charts accepts YYYY-MM-DD strings)
  return dateStr;
}

function renderCharts(data) {
  _chartData = data;
  const ohlcv = data.ohlcv || [];
  const indicators = data.indicators || {};

  // ── Main Chart (Candlestick + MAs + Bollinger) ──
  const mainEl = document.getElementById('mainChartContainer');
  mainEl.innerHTML = '';
  mainChart = _createChart(mainEl, 320);

  // Candlestick
  mainCandleSeries = mainChart.addCandlestickSeries({
    upColor: CHART_COLORS.up, downColor: CHART_COLORS.down,
    borderUpColor: CHART_COLORS.up, borderDownColor: CHART_COLORS.down,
    wickUpColor: CHART_COLORS.up, wickDownColor: CHART_COLORS.down,
  });
  const candleData = ohlcv.filter(d => d.close != null).map(d => ({
    time: _toChartTime(d.date),
    open: d.open, high: d.high, low: d.low, close: d.close,
  }));
  mainCandleSeries.setData(candleData);

  // MA Lines
  const maColors = { ma5: CHART_COLORS.ma5, ma20: CHART_COLORS.ma20, ma60: CHART_COLORS.ma60 };
  mainMASeries = {};
  ['ma5', 'ma20', 'ma60'].forEach(key => {
    if (!indicators[key]) return;
    const series = mainChart.addLineSeries({
      color: maColors[key], lineWidth: 1, priceLineVisible: false,
      lastValueVisible: false,
    });
    const maData = indicators[key].map((v, i) =>
      v != null && ohlcv[i] ? { time: _toChartTime(ohlcv[i].date), value: v } : null
    ).filter(Boolean);
    series.setData(maData);
    mainMASeries[key] = series;
  });

  // Bollinger overlay (if active indicator is bollinger)
  _renderBollingerOverlay(indicators);

  mainChart.timeScale().fitContent();

  // ── Volume Chart ──
  const volEl = document.getElementById('volumeChartContainer');
  volEl.innerHTML = '';
  volumeChart = _createChart(volEl, 100);

  volumeSeries = volumeChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: '',
  });
  const volData = ohlcv.filter(d => d.volume != null && d.close != null).map(d => ({
    time: _toChartTime(d.date),
    value: d.volume,
    color: d.close >= d.open ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)',
  }));
  volumeSeries.setData(volData);
  volumeChart.timeScale().fitContent();

  // ── Sync crosshairs ──
  _syncTimeScales([mainChart, volumeChart]);

  // ── Indicator sub-chart ──
  renderIndicatorChart(indicators);

  // ── Fundamentals ──
  renderFundamentals(data);

  // Resize handler
  const leftPane = document.getElementById('modalLeft');
  const resizeObs = new ResizeObserver(() => {
    const w = leftPane.clientWidth - 32;
    if (mainChart) mainChart.applyOptions({ width: w });
    if (volumeChart) volumeChart.applyOptions({ width: w });
    if (indicatorChart) indicatorChart.applyOptions({ width: w });
  });
  resizeObs.observe(leftPane);
}

function _renderBollingerOverlay(indicators) {
  // Remove old bollinger series
  Object.values(mainBollingerSeries).forEach(s => {
    try { mainChart.removeSeries(s); } catch(e) {}
  });
  mainBollingerSeries = {};

  if (currentIndicator !== 'bollinger' || !indicators.bollinger) return;

  const boll = indicators.bollinger;
  const ohlcv = _chartData.ohlcv;
  ['upper', 'middle', 'lower'].forEach(key => {
    if (!boll[key]) return;
    const color = key === 'middle' ? CHART_COLORS.bollMiddle :
                  key === 'upper' ? CHART_COLORS.bollUpper : CHART_COLORS.bollLower;
    const series = mainChart.addLineSeries({
      color, lineWidth: 1, lineStyle: key === 'middle' ? 0 : 2,
      priceLineVisible: false, lastValueVisible: false,
    });
    const lineData = boll[key].map((v, i) =>
      v != null && ohlcv[i] ? { time: _toChartTime(ohlcv[i].date), value: v } : null
    ).filter(Boolean);
    series.setData(lineData);
    mainBollingerSeries[key] = series;
  });
}

function renderIndicatorChart(indicators) {
  const el = document.getElementById('indicatorChartContainer');
  el.innerHTML = '';
  if (indicatorChart) { indicatorChart.remove(); indicatorChart = null; }

  indicatorChart = _createChart(el, 140);
  const ohlcv = _chartData.ohlcv;

  if (currentIndicator === 'macd' && indicators.macd) {
    const macd = indicators.macd;
    // MACD histogram
    const histSeries = indicatorChart.addHistogramSeries({
      priceLineVisible: false, lastValueVisible: false,
    });
    const histData = macd.histogram.map((v, i) =>
      v != null && ohlcv[i] ? {
        time: _toChartTime(ohlcv[i].date), value: v,
        color: v >= 0 ? CHART_COLORS.macdHistPos : CHART_COLORS.macdHistNeg,
      } : null
    ).filter(Boolean);
    histSeries.setData(histData);

    // MACD line
    const macdLine = indicatorChart.addLineSeries({
      color: CHART_COLORS.macdLine, lineWidth: 1.5,
      priceLineVisible: false, lastValueVisible: false,
    });
    macdLine.setData(macd.macd.map((v, i) =>
      v != null && ohlcv[i] ? { time: _toChartTime(ohlcv[i].date), value: v } : null
    ).filter(Boolean));

    // Signal line
    const sigLine = indicatorChart.addLineSeries({
      color: CHART_COLORS.macdSignal, lineWidth: 1.5,
      priceLineVisible: false, lastValueVisible: false,
    });
    sigLine.setData(macd.signal.map((v, i) =>
      v != null && ohlcv[i] ? { time: _toChartTime(ohlcv[i].date), value: v } : null
    ).filter(Boolean));

  } else if (currentIndicator === 'rsi' && indicators.rsi) {
    const rsiLine = indicatorChart.addLineSeries({
      color: CHART_COLORS.rsiLine, lineWidth: 1.5,
      priceLineVisible: false, lastValueVisible: false,
    });
    rsiLine.setData(indicators.rsi.map((v, i) =>
      v != null && ohlcv[i] ? { time: _toChartTime(ohlcv[i].date), value: v } : null
    ).filter(Boolean));

    // Overbought / Oversold horizontal lines (via baseline series workaround: use price lines)
    rsiLine.createPriceLine({ price: 70, color: CHART_COLORS.down, lineWidth: 1, lineStyle: 2, axisLabelVisible: true });
    rsiLine.createPriceLine({ price: 30, color: CHART_COLORS.up, lineWidth: 1, lineStyle: 2, axisLabelVisible: true });
    rsiLine.createPriceLine({ price: 50, color: '#555', lineWidth: 1, lineStyle: 1, axisLabelVisible: false });

  } else if (currentIndicator === 'bollinger') {
    // Bollinger is overlaid on main chart; indicator pane shows bandwidth
    const boll = indicators.bollinger;
    if (boll && boll.upper && boll.lower && boll.middle) {
      const bwSeries = indicatorChart.addLineSeries({
        color: '#2196f3', lineWidth: 1.5,
        priceLineVisible: false, lastValueVisible: false,
      });
      const bwData = boll.upper.map((u, i) => {
        if (u == null || boll.lower[i] == null || boll.middle[i] == null || !ohlcv[i]) return null;
        const bw = boll.middle[i] !== 0 ? ((u - boll.lower[i]) / boll.middle[i]) * 100 : 0;
        return { time: _toChartTime(ohlcv[i].date), value: Math.round(bw * 100) / 100 };
      }).filter(Boolean);
      bwSeries.setData(bwData);
    }
  }

  indicatorChart.timeScale().fitContent();
  _syncTimeScales([mainChart, volumeChart, indicatorChart]);
}

function switchIndicator(type) {
  currentIndicator = type;
  document.querySelectorAll('.ind-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.ind === type);
  });
  if (_chartData) {
    _renderBollingerOverlay(_chartData.indicators || {});
    renderIndicatorChart(_chartData.indicators || {});
  }
}

function _syncTimeScales(charts) {
  const validCharts = charts.filter(Boolean);
  if (validCharts.length < 2) return;
  let syncing = false;
  validCharts.forEach((chart, idx) => {
    chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      validCharts.forEach((other, oi) => {
        if (oi !== idx) other.timeScale().setVisibleLogicalRange(range);
      });
      syncing = false;
    });
  });
}

  cards.innerHTML = `

      <div class="fc-label">6M 区间</div>

      <div class="fc-sub">6M 涨跌: ${retPct}%</div>
    </div>
    <div class="fund-card">
      <div class="fc-label">20日均量</div>
      <div class="fc-value neutral">${avgVolVal != null ? fmtBig(avgVolVal) : 'N/A'}</div>
      <div class="fc-sub">合约</div>
    </div>
    <div class="fund-card">
      <div class="fc-label">持仓量 (OI)</div>
      <div class="fc-value ${oiChg != null ? (oiChg >= 0 ? 'pos' : 'neg') : 'neutral'}">
        ${latestOI != null ? fmtBig(latestOI) : 'N/A'}
      </div>
      <div class="fc-sub">${oiChg != null ? (oiChg >= 0 ? '+' : '') + fmtBig(oiChg) + ' vs 前日' : ''}</div>
    </div>
    <div class="fund-card">
      <div class="fc-label">基差 (Basis)</div>
      <div class="fc-value ${latestBasis != null ? (latestBasis >= 0 ? 'pos' : 'neg') : 'neutral'}">
        ${latestBasis != null ? (latestBasis >= 0 ? '+' : '') + fmtBig(latestBasis) : 'N/A'}
      </div>
      <div class="fc-sub">${latestBasis != null ? (latestBasis > 0 ? '升水 (Contango)' : '贴水 (Backwardation)') : ''}</div>
    </div>
    <div class="fund-card">
      <div class="fc-label">数据来源</div>

// ═══════════════════════════════════════════════════════════════
//  Real-time price polling
// ═══════════════════════════════════════════════════════════════

function _stopRealtimePolling() {
  if (_realtimeInterval) {
    clearInterval(_realtimeInterval);
    _realtimeInterval = null;
  }
  _realtimeTicker = '';
  const badge = document.getElementById('liveBadge');
  const priceDisp = document.getElementById('livePriceDisplay');
  if (badge) badge.style.display = 'none';
  if (priceDisp) priceDisp.style.display = 'none';
}

function _startRealtimePolling(windTicker, name) {
  _stopRealtimePolling();
  _realtimeTicker = windTicker;
  // Do first fetch immediately, then poll every 5 seconds
  _fetchRealtimePrice(windTicker, name);
  _realtimeInterval = setInterval(() => _fetchRealtimePrice(windTicker, name), 5000);
}

async function _fetchRealtimePrice(windTicker, name) {
  if (!windTicker || !mainChart || !mainCandleSeries) return;
  try {
    const params = new URLSearchParams({ ticker: windTicker });
    if (name) params.set('name', name);
    const resp = await fetch('/api/realtime-price?' + params.toString());
    const rt = await resp.json();
    if (!rt.ok || rt.price == null) return;

    // ── Update badge & header price display ──
    const badge = document.getElementById('liveBadge');
    const priceDisp = document.getElementById('livePriceDisplay');
    badge.style.display = 'inline-flex';
    priceDisp.style.display = 'inline';

    const chg = rt.change != null ? rt.change : 0;
    const chgPct = rt.change_pct != null ? rt.change_pct : 0;
    const isUp = chg >= 0;
    priceDisp.innerHTML = `
      <span class="lp-price">${fmtBig(rt.price)}</span>
      <span class="lp-chg ${isUp ? 'pos' : 'neg'}">${isUp ? '+' : ''}${fmtBig(chg)} (${chgPct >= 0 ? '+' : ''}${Number(chgPct).toFixed(2)}%)</span>
      <span class="lp-time">${rt.time || ''}</span>
    `;

    // ── Update last candle on the chart (today's real-time bar) ──
    const ohlcv = _chartData ? _chartData.ohlcv : [];
    if (ohlcv.length > 0) {
      const lastBar = ohlcv[ohlcv.length - 1];
      const today = new Date().toISOString().slice(0, 10);
      const lastDate = lastBar.date;

      if (lastDate === today) {
        // Update today's candle with real-time data
        const updatedCandle = {
          time: _toChartTime(today),
          open: rt.open != null ? rt.open : lastBar.open,
          high: Math.max(rt.high != null ? rt.high : lastBar.high, rt.price),
          low: Math.min(rt.low != null ? rt.low : lastBar.low, rt.price),
          close: rt.price,
        };
        mainCandleSeries.update(updatedCandle);

        // Update volume bar too
        if (volumeSeries && rt.volume != null) {
          volumeSeries.update({
            time: _toChartTime(today),
            value: rt.volume,
            color: rt.price >= (rt.open || lastBar.open) ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)',
          });
        }
      } else {
        // Today is a new day not yet in historical data — append a new candle
        const newCandle = {
          time: _toChartTime(today),
          open: rt.open != null ? rt.open : rt.price,
          high: rt.high != null ? rt.high : rt.price,
          low: rt.low != null ? rt.low : rt.price,
          close: rt.price,
        };
        mainCandleSeries.update(newCandle);

        if (volumeSeries && rt.volume != null) {
          volumeSeries.update({
            time: _toChartTime(today),
            value: rt.volume,
            color: rt.price >= (rt.open || rt.price) ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)',
          });
        }
      }
    }

    // ── Price line marker ──
    if (_realtimePriceLine && mainCandleSeries) {
      try { mainCandleSeries.removePriceLine(_realtimePriceLine); } catch(e) {}
    }
    _realtimePriceLine = mainCandleSeries.createPriceLine({
      price: rt.price,
      color: isUp ? '#34d399' : '#f87171',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dotted,
      axisLabelVisible: true,
      title: '实时',
    });

    // ── Update fundamentals panel "最新价格" card ──
    const fundCards = document.getElementById('fundCards');
    if (fundCards) {
      const firstCard = fundCards.querySelector('.fund-card');
      if (firstCard) {
        const valEl = firstCard.querySelector('.fc-value');
        const subEl = firstCard.querySelector('.fc-sub');
        if (valEl) {
          valEl.style.color = isUp ? 'var(--green)' : 'var(--red)';
          valEl.textContent = fmtBig(rt.price);
        }
        if (subEl) {
          subEl.textContent = `${isUp ? '+' : ''}${fmtBig(chg)} (${chgPct >= 0 ? '+' : ''}${Number(chgPct).toFixed(2)}%)`;
        }
      }
    }

  } catch (err) {
    // Silent fail — don't break the UI for real-time updates
    console.warn('[RT] realtime fetch failed:', err.message);
  }
}
